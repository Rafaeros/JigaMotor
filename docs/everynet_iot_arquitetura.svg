<svg xmlns="http://www.w3.org/2000/svg" width="900" viewBox="0 0 900 1020" style="background:#fff;font-family:Arial,sans-serif">

  <!-- ═══════════════════════════════════════════════
       TÍTULOS DE CAMADA
  ═══════════════════════════════════════════════ -->

  <!-- Camada: Campo / Devices -->
  <rect x="20" y="20" width="860" height="10" rx="0" fill="#E1F5EE" opacity="0.5"/>
  <text x="450" y="16" text-anchor="middle" font-size="10" fill="#0F6E56" font-weight="bold" letter-spacing="2">CAMPO — DEVICES LoRaWAN</text>

  <!-- Device 1 -->
  <rect x="50" y="28" width="170" height="58" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="135" y="50" text-anchor="middle" font-size="13" font-weight="bold" fill="#085041">Device LoRaWAN</text>
  <text x="135" y="68" text-anchor="middle" font-size="11" fill="#0F6E56">OTAA / ABP</text>
  <text x="135" y="82" text-anchor="middle" font-size="10" fill="#1D9E75">Sensor / Atuador</text>

  <!-- Device 2 -->
  <rect x="365" y="28" width="170" height="58" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="450" y="50" text-anchor="middle" font-size="13" font-weight="bold" fill="#085041">Device LoRaWAN</text>
  <text x="450" y="68" text-anchor="middle" font-size="11" fill="#0F6E56">OTAA / ABP</text>
  <text x="450" y="82" text-anchor="middle" font-size="10" fill="#1D9E75">Sensor / Atuador</text>

  <!-- Device 3 -->
  <rect x="680" y="28" width="170" height="58" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="765" y="50" text-anchor="middle" font-size="13" font-weight="bold" fill="#085041">Device LoRaWAN</text>
  <text x="765" y="68" text-anchor="middle" font-size="11" fill="#0F6E56">OTAA / ABP</text>
  <text x="765" y="82" text-anchor="middle" font-size="10" fill="#1D9E75">Sensor / Atuador</text>

  <!-- setas devices → gateways -->
  <line x1="135" y1="86" x2="135" y2="138" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="86" x2="450" y2="138" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="765" y1="86" x2="765" y2="138" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="155" y="117" font-size="9" fill="#888">uplink RF</text>
  <text x="470" y="117" font-size="9" fill="#888">uplink RF</text>
  <text x="785" y="117" font-size="9" fill="#888">uplink RF</text>

  <!-- ═══════════════════════ GATEWAYS ═══════════════════════ -->
  <text x="450" y="135" text-anchor="middle" font-size="10" fill="#444" font-weight="bold" letter-spacing="2">GATEWAYS</text>

  <rect x="50" y="142" width="170" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="135" y="162" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C2C2A">Gateway</text>
  <text x="135" y="180" text-anchor="middle" font-size="10" fill="#5F5E5A">LoRa → IP/Backhaul</text>

  <rect x="365" y="142" width="170" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="450" y="162" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C2C2A">Gateway</text>
  <text x="450" y="180" text-anchor="middle" font-size="10" fill="#5F5E5A">LoRa → IP/Backhaul</text>

  <rect x="680" y="142" width="170" height="50" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="765" y="162" text-anchor="middle" font-size="13" font-weight="bold" fill="#2C2C2A">Gateway</text>
  <text x="765" y="180" text-anchor="middle" font-size="10" fill="#5F5E5A">LoRa → IP/Backhaul</text>

  <!-- setas gateways → LNS -->
  <line x1="135" y1="192" x2="330" y2="258" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="192" x2="450" y2="258" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="765" y1="192" x2="570" y2="258" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════ LNS ═══════════════════════ -->
  <text x="450" y="252" text-anchor="middle" font-size="10" fill="#534AB7" font-weight="bold" letter-spacing="2">EVERYNET NETWORK SERVER (LNS)</text>

  <rect x="130" y="260" width="640" height="70" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.5"/>
  <text x="450" y="285" text-anchor="middle" font-size="14" font-weight="bold" fill="#3C3489">Everynet Network Server</text>
  <text x="450" y="303" text-anchor="middle" font-size="11" fill="#534AB7">Join Server · Roteamento de pacotes · Deduplicação · MIC check</text>
  <text x="450" y="320" text-anchor="middle" font-size="10" fill="#7F77DD">ns.eu1.everynet.io</text>

  <!-- setas LNS → APIs (3 saídas) -->
  <line x1="260" y1="330" x2="175" y2="390" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="330" x2="450" y2="390" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="640" y1="330" x2="725" y2="390" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════ APIs ═══════════════════════ -->
  <text x="450" y="385" text-anchor="middle" font-size="10" fill="#185FA5" font-weight="bold" letter-spacing="2">INTERFACES DE ACESSO</text>

  <!-- Management API -->
  <rect x="30" y="394" width="220" height="90" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="1.5"/>
  <text x="140" y="416" text-anchor="middle" font-size="13" font-weight="bold" fill="#0C447C">Management API</text>
  <text x="140" y="434" text-anchor="middle" font-size="10" fill="#185FA5">REST HTTPS</text>
  <text x="140" y="450" text-anchor="middle" font-size="10" fill="#185FA5">CRUD: devices, apps, gateways</text>
  <text x="140" y="466" text-anchor="middle" font-size="10" fill="#185FA5">Downlink queue</text>
  <text x="140" y="480" text-anchor="middle" font-size="9" fill="#378ADD">/api/v1.0/devices</text>

  <!-- Data API -->
  <rect x="340" y="394" width="220" height="90" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1.5"/>
  <text x="450" y="416" text-anchor="middle" font-size="13" font-weight="bold" fill="#712B13">Data API</text>
  <text x="450" y="434" text-anchor="middle" font-size="10" fill="#993C1D">REST HTTPS</text>
  <text x="450" y="450" text-anchor="middle" font-size="10" fill="#993C1D">Uplinks históricos</text>
  <text x="450" y="466" text-anchor="middle" font-size="10" fill="#993C1D">Filtro por device, tempo</text>
  <text x="450" y="480" text-anchor="middle" font-size="9" fill="#D85A30">/api/v1.0/devices/{eui}/packets</text>

  <!-- MQTT Broker -->
  <rect x="650" y="394" width="220" height="90" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1.5"/>
  <text x="760" y="416" text-anchor="middle" font-size="13" font-weight="bold" fill="#633806">MQTT Broker</text>
  <text x="760" y="434" text-anchor="middle" font-size="10" fill="#854F0B">mqtt.eu1.everynet.io</text>
  <text x="760" y="450" text-anchor="middle" font-size="10" fill="#854F0B">Porta 1883 / 8883 TLS</text>
  <text x="760" y="466" text-anchor="middle" font-size="10" fill="#854F0B">Sub: lora/+/up</text>
  <text x="760" y="480" text-anchor="middle" font-size="9" fill="#BA7517">Pub/Sub tempo real</text>

  <!-- setas APIs → App -->
  <line x1="140" y1="484" x2="310" y2="558" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="450" y1="484" x2="450" y2="558" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="760" y1="484" x2="590" y2="558" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ═══════════════════════ APLICAÇÃO ═══════════════════════ -->
  <text x="450" y="553" text-anchor="middle" font-size="10" fill="#3B6D11" font-weight="bold" letter-spacing="2">APLICAÇÃO DO CLIENTE</text>

  <rect x="200" y="562" width="500" height="60" rx="10" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1.5"/>
  <text x="450" y="585" text-anchor="middle" font-size="14" font-weight="bold" fill="#27500A">Backend / Dashboard da Aplicação</text>
  <text x="450" y="605" text-anchor="middle" font-size="11" fill="#3B6D11">Consome Management API · Data API · MQTT broker</text>

  <!-- ═══════════════════════ DOWNLINK ═══════════════════════ -->

  <!-- separador visual -->
  <line x1="20" y1="648" x2="880" y2="648" stroke="#ddd" stroke-width="1" stroke-dasharray="6 4"/>
  <text x="450" y="642" text-anchor="middle" font-size="10" fill="#A32D2D" font-weight="bold" letter-spacing="2">DOWNLINK — COMANDOS AO DEVICE</text>

  <!-- app → POST downlink -->
  <line x1="450" y1="622" x2="450" y2="658" stroke="#A32D2D" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="200" y="660" width="500" height="72" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1.5"/>
  <text x="450" y="682" text-anchor="middle" font-size="13" font-weight="bold" fill="#791F1F">POST — fila de downlink</text>
  <text x="450" y="700" text-anchor="middle" font-size="10" fill="#A32D2D">Management API: /api/v1.0/devices/{dev_eui}/queue</text>
  <text x="450" y="716" text-anchor="middle" font-size="10" fill="#A32D2D">Body: { "fport": 2, "payload": "&lt;base64&gt;", "confirmed": true }</text>
  <text x="450" y="730" text-anchor="middle" font-size="9" fill="#E24B4A">Header: Authorization: Bearer &lt;token&gt;</text>

  <!-- downlink → LNS → gateway → device (linha tracejada de retorno) -->
  <path d="M450 732 L450 770 L60 770 L60 167" fill="none" stroke="#A32D2D" stroke-width="1.2" stroke-dasharray="7 4" marker-end="url(#arr-red)"/>
  <text x="240" y="762" font-size="9" fill="#A32D2D">LNS enfileira → gateway → device (RX1/RX2 ou Classe C)</text>

  <!-- ═══════════════════════ PAYLOADS ═══════════════════════ -->
  <text x="450" y="800" text-anchor="middle" font-size="10" fill="#444" font-weight="bold" letter-spacing="2">EXEMPLOS DE PAYLOAD BASE64</text>

  <!-- Entrar emergência -->
  <rect x="30" y="808" width="390" height="92" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="1.2"/>
  <text x="225" y="828" text-anchor="middle" font-size="13" font-weight="bold" fill="#791F1F">Entrar em emergência</text>
  <text x="225" y="846" text-anchor="middle" font-size="10" fill="#A32D2D">Bytes: 0x01  0x02  0x01</text>
  <text x="225" y="862" text-anchor="middle" font-size="11" font-weight="bold" fill="#501313">Base64: AQIB</text>
  <text x="225" y="878" text-anchor="middle" font-size="10" fill="#A32D2D">fport: 2   confirmed: true</text>
  <text x="225" y="893" text-anchor="middle" font-size="9" fill="#E24B4A">python: base64.b64encode(bytes([0x01,0x02,0x01]))</text>

  <!-- Sair emergência -->
  <rect x="480" y="808" width="390" height="92" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1.2"/>
  <text x="675" y="828" text-anchor="middle" font-size="13" font-weight="bold" fill="#27500A">Sair de emergência</text>
  <text x="675" y="846" text-anchor="middle" font-size="10" fill="#3B6D11">Bytes: 0x01  0x02  0x00</text>
  <text x="675" y="862" text-anchor="middle" font-size="11" font-weight="bold" fill="#173404">Base64: AQIA</text>
  <text x="675" y="878" text-anchor="middle" font-size="10" fill="#3B6D11">fport: 2   confirmed: true</text>
  <text x="675" y="893" text-anchor="middle" font-size="9" fill="#639922">python: base64.b64encode(bytes([0x01,0x02,0x00]))</text>

  <!-- legenda -->
  <rect x="20" y="918" width="860" height="82" rx="8" fill="#F8F8F8" stroke="#ddd" stroke-width="1"/>
  <text x="40" y="936" font-size="11" font-weight="bold" fill="#444">Legenda</text>
  <rect x="40" y="944" width="14" height="10" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="60" y="954" font-size="10" fill="#333">Device LoRaWAN</text>
  <rect x="170" y="944" width="14" height="10" rx="2" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="190" y="954" font-size="10" fill="#333">Gateway</text>
  <rect x="270" y="944" width="14" height="10" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="290" y="954" font-size="10" fill="#333">LNS Everynet</text>
  <rect x="390" y="944" width="14" height="10" rx="2" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
  <text x="410" y="954" font-size="10" fill="#333">Management API</text>
  <rect x="530" y="944" width="14" height="10" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text x="550" y="954" font-size="10" fill="#333">Data API</text>
  <rect x="620" y="944" width="14" height="10" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text x="640" y="954" font-size="10" fill="#333">MQTT Broker</text>
  <rect x="730" y="944" width="14" height="10" rx="2" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1"/>
  <text x="750" y="954" font-size="10" fill="#333">Aplicação</text>

  <line x1="40" y1="976" x2="90" y2="976" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="96" y="980" font-size="10" fill="#333">Uplink (device → nuvem)</text>
  <line x1="240" y1="976" x2="290" y2="976" stroke="#A32D2D" stroke-width="1.2" stroke-dasharray="6 3" marker-end="url(#arr-red)"/>
  <text x="296" y="980" font-size="10" fill="#333">Downlink (nuvem → device)</text>
  <line x1="480" y1="976" x2="530" y2="976" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="536" y="980" font-size="10" fill="#333">Fluxo interno Everynet</text>

  <!-- MARKERS -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#A32D2D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

</svg>
